name: Security Release Gate

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Staging base URL for DAST (example: https://staging.example.com)"
        required: true
        type: string

permissions:
  contents: read
  security-events: write

jobs:
  backend-tests:
    name: Backend Security Regression Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend
      - name: Run backend tests
        run: npm test
        working-directory: backend

  semgrep:
    name: Semgrep SAST Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/security-audit

  npm-audit-critical:
    name: npm audit critical gate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - backend
          - FREQVAULT/freqvault_admin
          - FREQVAULT/freqvault_user
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.project }}
      - name: Audit critical vulnerabilities
        run: npm audit --audit-level=critical
        working-directory: ${{ matrix.project }}

  dast:
    name: OWASP ZAP DAST Gate
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - semgrep
      - npm-audit-critical
    steps:
      - name: Run ZAP Baseline
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ inputs.target_url }}
          fail_action: true
          issue_title: "Release Gate ZAP Findings"
          cmd_options: "-a"

